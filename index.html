<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kapama App</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { background:#0b1220; color:white; font-family:Arial; padding:20px }
table { width:100%; margin-top:20px; border-collapse:collapse }
td,th { padding:8px; border-bottom:1px solid #333 }
.red { color:#ff4d4f }
.green { color:#52c41a }
</style>
</head>

<body>

<h2>KAPAMA • Üretim Takip</h2>

<input type="file" id="file" />
<input type="text" id="search" placeholder="Model ara..." />

<table>
<thead>
<tr>
<th>Model</th>
<th>Atölye</th>
<th>Üretim</th>
<th>Referans</th>
<th>Fark</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let allData = [];

document.getElementById("file").addEventListener("change", (e) => {
  const reader = new FileReader();
  reader.onload = (evt) => {
    const wb = XLSX.read(evt.target.result, { type: "binary" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws);

    allData = json
      .filter(r => r["Sipariş Tipi"] == 1 || r["Sipariş Tipi"] == 3)
      .map(r => {
        let total =
          (+r["Üretim"] || 0) +
          (+r["Üretim 1A"] || 0) +
          (+r["Üretim 2K"] || 0) +
          (+r["Üretim Fazlası"] || 0);

        let ref = r["Tasnif"] ? +r["Tasnif"] : (+r["Kesim"] || 0);

        return {
          model: r["Model"],
          atolye: r["Atölye"],
          total,
          ref,
          diff: total - ref
        };
      });

    render(allData);
  };
  reader.readAsBinaryString(e.target.files[0]);
});

document.getElementById("search").addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();
  render(allData.filter(d => d.model?.toLowerCase().includes(val)));
});

function render(data) {
  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  data.forEach(d => {
    tbody.innerHTML += `
      <tr>
        <td>${d.model}</td>
        <td>${d.atolye}</td>
        <td>${d.total}</td>
        <td>${d.ref}</td>
        <td class="${d.diff < 0 ? 'red' : 'green'}">${d.diff}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
